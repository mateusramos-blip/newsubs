<h1>Contato</h1>
<p>Entre em contato com a gente.</p>

<div class="cards">
    <div class="card">
        <h2>E-mail</h2>
        <p>Aqui entraremos em contato via email algum@email.com.</p>
    </div>

    <div class="card">
        <h2>Telefone</h2>
        <p>Aqui deveria ter algum telefone como (24) 3344-5511.</p>
    </div>

    <div class="card">
        <h2>Chat</h2>

        <p>Inicie a conversa dando um "Oi" ou "Olá"</p>

        <div id="chatbox"></div>

        <input type="text" id="input" placeholder="Digite algo...">

        <button onclick="responder()">Enviar</button>
    </div>
</div>

<div class="voltar-container">
    <button id="btnVoltar">Voltar ao Início</button>
</div>
