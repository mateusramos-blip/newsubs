<body>

<header class="topo">
    <div class="logo">Projeto Além da Substância</div>

        </ul>
    </nav>
</header>
<main class="conteudo">
    <h1>Contato</h1>
    <p>Entre em contato com a gente.</p>

    <div class="cards">
        <div class="card">
            <h2>E-mail</h2>
            <p>Aqui entraremos em contato via email algum@email.com.</p>
        </div>

        <div class="card">
            <h2>Telefone</h2>
            <p>Aqui deveria ter algum telefone como (24) 3344-5511.</p>
        </div>

        <div class="card">
            <h2>Chat</h2>
            <p>Inicie a conversando dando um "Oi" ou um "Olá"</p>
            <div id="chatbox"></div>
            <input type="text" id="input" placeholder="Digite algo..." />
                <button onclick="responder()">Enviar</button>
        </div>
    </div>
        <div class="voltar-container">
    <button onclick="location.href='index.html';">Voltar ao Inicio</button>
    </div>
</main>
<script>
    document.addEventListener("DOMContentLoaded", function () {

  function responder() {
    let inputEl = document.getElementById("input");
    let chat = document.getElementById("chatbox");

    if (!inputEl || !chat) return;

    let input = inputEl.value.toLowerCase().trim();
    if (input === "") return;

    chat.innerHTML += `<p class='user'>Você: ${input}</p>`;

    let resposta = "Não entendi 😅";

    if (input.includes("oi") || input.includes("olá") || input.includes("ola")) {
      resposta = `Olá! 👋

Posso te ajudar com:

👉 "horário"  
👉 "preço"  
👉 "contato"`;
    } else if (input.includes("horário") || input.includes("horario")) {
      resposta = "Funcionamos das 8h às 18h.";
    } else if (input.includes("preço") || input.includes("preco")) {
      resposta = "Os preços variam, me diga o produto 😉";
    } else if (input.includes("contato")) {
      resposta = "Nosso WhatsApp é (xx) xxxx-xxxx";
    }

    chat.innerHTML += `<p class='bot'>Bot: ${resposta}</p>`;

    inputEl.value = "";
    chat.scrollTop = chat.scrollHeight;
  }

  // deixa botão funcionar
  window.responder = responder;

  // ENTER
  const inputCampo = document.getElementById("input");

  if (inputCampo) {
    inputCampo.addEventListener("keypress", function (event) {
      if (event.key === "Enter") {
        responder();
      }
    });
  }

});
</script>
</body>
</html>
